name: iOS Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:  # 支持手动 gh 触发，用于 iOS 验证结果回填

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'  # 推荐使用 'stable'，或改成你本地 `flutter --version` 的精确版本（例如 3.24.3）
          channel: 'stable'
          cache: false  # 临时禁用缓存避免问题

      - name: Verify Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign for CI check)
        run: flutter build ios --no-codesign --release

      - name: Upload iOS build artifacts (optional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
