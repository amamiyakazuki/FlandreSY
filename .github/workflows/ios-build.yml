name: iOS Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign for CI check)
        run: flutter build ios --no-codesign --release

      - name: Upload iOS build artifacts (optional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
